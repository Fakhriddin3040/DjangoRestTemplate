services:
  marketplace:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketplace
    expose:
      - "3000"
    networks:
      - marketplace-network
    volumes:
      - marketplace-client:/app/dist/marketplace-client/browser

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "3000:80"
      - "4000:3000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - marketplace-client:/usr/share/nginx/html
    depends_on:
      - marketplace
    networks:
      - marketplace-network

volumes:
  marketplace-client:

networks:
  marketplace-network:
    driver: bridge
