services:
  marketplace:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketplace
    networks:
      - marketplace-network
    expose:
      - "4200"
      - "3000"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "80:80"
      -  "3000:3000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - marketplace
    networks:
      - marketplace-network

volumes:
  marketplace-client:

networks:
  marketplace-network:
    driver: bridge
