services:
  frontend:
    image: ghcr.io/it-lab-tj/marketplace-client-nodejs:latest
    container_name: frontend
    ports:
      - "4200:4200"
      - "3000:3000"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: ghcr.io/it-lab-tj/marketplace-client-nginx:latest
    container_name: nginx
    ports:
      - "4200:4200"
      - "3000:3000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
    networks:
      - marketplace-network

networks:
  marketplace-network:
    driver: bridge