services:
  nodejs:
    image: ghcr.io/it-lab-tj/marketplace-client-nodejs
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nodejs
    expose:
      - "4200"
      - "3000"
    networks:
      - marketplace-network

  proxy:
    image: ghcr.io/it-lab-tj/marketplace-client-proxy
    build:
      context: ./nginx
      dockerfile: Dockerfile
    volumes:
      - nginx_data:/etc/nginx
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    container_name: proxy

    ports:
      - "80:80"
      - "443:443"
      - "3000:3000"
    networks:
      - marketplace-network
    depends_on:
      - nodejs
      - manipulator

  cert:
    image: certbot/certbot:latest
    container_name: cert
    env_file:
      - .env
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_data:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${DOMAIN_EMAIL} --agree-tos --no-eff-email -d ${DOMAIN_URL}
    networks:
      - marketplace-network
    profiles:
      - certbot_profile

  manipulator:
    image: docker:latest
    build:
      context: ./manipulator
      dockerfile: Dockerfile
      args:
        - DOMAIN_URL=${DOMAIN_URL}
    env_file:
      - .env
    container_name: manipulator
    working_dir: /compose_files
    networks:
      - marketplace-network

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

      # From here, will manipulate with nginx container
      # configurations from this container.
      - nginx_data:/etc/nginx
      - certbot_data:/etc/letsencrypt

      # Mount compose files for composing containers.
      - ./compose.yml:/compose_files/compose.yml
      - ./compose.override.yml:/compose_files/compose.override.yml
      - .env:/compose_files/.env

    environment:
      - NGINX_CONTAINER=proxy
      - CERTBOT_CONTAINER=cert
      - DOMAIN_URL=${DOMAIN_URL}
      - NGINX_CONF_D=/etc/nginx/conf.d
    
networks:
  marketplace-network:
    driver: bridge

volumes:
  nginx_data:
  certbot_data:
  certbot_www:
  certbot_scripts:
