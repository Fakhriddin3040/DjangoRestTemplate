upstream marketplace-proxy {
    server marketplace:3000;
}
upstream marketplace-client {
    server marketplace:4200;
}

server {
    listen 3000;

    location / {
        proxy_pass http://marketplace-proxy;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
  listen 80;

  location / {
        proxy_pass http://marketplace-client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
}

}
