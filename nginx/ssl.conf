# nginx.conf

upstream marketplace-proxy {
    server nodejs:3000;
}
upstream marketplace-client {
    server nodejs:4200;
}
upstream certbot {
    server certbot:6000;
}

server {
    listen 3000;

    location / {
        proxy_pass http://marketplace-proxy;
        proxy_http_version 1.1;
    }
}

server {
    listen 443 ssl http2;
    server_name astrotech-spaceapp.space;

    ssl_certificate /etc/cert.pem;
    ssl_certificate_key /etc/key.pem;

    location / {
        proxy_pass http://marketplace-client;
        proxy_http_version 1.1;
    }
}
