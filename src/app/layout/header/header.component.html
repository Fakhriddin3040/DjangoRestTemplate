

<header class="header">
  <div class="header__banner">
    <div  class="header__banner-item header__banner-item--image">
      <img [src]="imageUrl" alt="discount banner">
    </div>
    <div class="header__banner-item header__banner-item--text">
      <img [src]="imageUrl2" alt="discount banner">
    </div>
  </div>
  <div class="header__options">
    <div class="header__language">Language</div>
    <div class="header__currency">Currency</div>
    <div class="header__additional-options">Other Options</div>
  </div>
  <div class="header__utilities">
    <div class="header__logo">Logo</div>
    <div class="header__search-form">Search Form</div>
    <div class="header__login">Login</div>
    <div class="header__registration">Registration</div>
  </div>
  <div class="header__menu">
    <div class="header__menu-section">Menu Section</div>
  </div>
</header>
