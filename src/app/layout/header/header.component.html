<header class="header"> 
  <app-header-section1-banner></app-header-section1-banner>

  <app-container>
    <app-header-section2-option></app-header-section2-option>

    <div class="header__utilities">
      <div class="header__utilities-logo">
        <img src="" alt="logo" />
      </div>
      <div class="header__utilities-search-form">
        <div class="header__utilities-search-form-input-group input-group mb-3">
          <input
            type="text"
            class="header__utilities-search-form-input form-control"
            placeholder="I`m looking for..."
            aria-label="Recipient's username"
            aria-describedby="button-addon2"
          />
          <button
            class="header__utilities-search-form-button btn btn-outline-secondary"
            type="button"
            id="button-addon2"
          >
            Search
          </button>
        </div>
      </div>
      <div class="header__utilities-icons">
        <i class="header__utilities-icon bi bi-heart"></i>
        <i class="header__utilities-icon bi bi-handbag"></i>
        <div class="header__utilities-user">
          <i class="header__utilities-icon bi bi-person"></i>
          <div class="header__utilities-user-actions">      
            <app-info-user *ngIf="isUserLoggedIn"></app-info-user>
            <app-login *ngIf="!isUserLoggedIn" (click)="navigateToLogin()"></app-login>
            <div class="header__utilities-  ">
              <a href="#">Register</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </app-container>



<div class="wrapperHeader__menu">
  <app-container>
    <div class="header__menu">
      <div class="header__menu-left">
        <i class="bi bi-list">Shop By Department</i> 
      </div>
      <div class="header__menu-center">Menu Section</div>
      <div class="header__menu-right">Hotline: 1-800-234-5678</div>
    </div>
  </app-container>

</div>


</header>
