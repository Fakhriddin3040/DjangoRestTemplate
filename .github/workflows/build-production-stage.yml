name: Build Production Stage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_CR_USER: ${{ secrets.DOCKER_CR_USER }}
  SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SERVER_SSH_PRIVATE_KEY }}
  DOCKER_CR_PASSWORD: ${{ secrets.DOCKER_CR_PASSWORD }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  
  HOST_IP: ${{ vars.HOST_IP }}
  HOST_USER: ${{ vars.HOST_USER }}
  WORK_DIR: ${{ vars.WORK_DIR }}
  SSH_IDENTITY_FILE: ${{ vars.SSH_IDENTITY_FILE_PATH }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          ssh-key: ${{ secrets.REPOSITORY_SSH_PRIVATE_KEY }}

      - name: Build and Push Docker Images to GitHub Container Registry
        run: |
          echo "$DOCKER_CR_PASSWORD" | docker login ghcr.io -u "$DOCKER_CR_USER" --password-stdin
          docker compose -f compose.build.yml build
          docker compose -f compose.build.yml push
          docker logout ghcr.io
      
      - name: Trigger production deployment
        run: |
          curl -X POST -H "Accept: application/vnd.github.everest-preview+json" \
          -H "Authorization: token $GH_TOKEN" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d '{"event_type": "container_push"}'